<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MJ Tool v1.5</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <div class="topbar">
    <h2>MJ Tool v1.5</h2>
    <div id="versionBox"></div>
  </div>

  <div id="scoreBoard"></div>

  <div class="panel">
    <select id="type">
      <option value="DISCARD">放炮</option>
      <option value="SELF">自摸</option>
    </select>

    <input id="winner" placeholder="赢家 A/B/C/D"/>
    <input id="loser" placeholder="输家 (放炮用)"/>

    <input id="base" type="number" value="100"/>

    <h3>鸟 E</h3>
    A<input id="E_A" type="number"/>
    B<input id="E_B" type="number"/>
    C<input id="E_C" type="number"/>
    D<input id="E_D" type="number"/>

    <button onclick="submitRound()">提交</button>
  </div>

  <div id="birdBox"></div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
